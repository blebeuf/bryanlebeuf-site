<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bryan LeBeuf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --bg-elev: #161513;
  --text: #F38325;
  --text-dim: #F0DCCA;
  --accent: #F0EEE9;
  --border: #25231f;
  --placeholder: #1a1815;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Libre Franklin', sans-serif;
  font-weight: 400;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Subtle film grain overlay — a nod to archival aesthetic */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1000;
  opacity: 0.035;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  mix-blend-mode: overlay;
}

/* Header / Nav — left sidebar on desktop, top bar on narrow screens */
:root { --sidebar-w: 220px; }

header {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: rgba(15, 14, 12, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-right: 1px solid var(--border);
  padding: 2.5rem 2rem;
  z-index: 100;
  overflow-y: auto;
  --text: #F0EEE9;
}

nav {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.92rem;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.55rem;
}

nav a {
  color: var(--text);
  text-decoration: none;
  padding: 0.15rem 0;
  transition: opacity 0.2s ease;
}

nav a:hover { opacity: 0.65; }

nav a.active {
  text-decoration: underline;
  text-underline-offset: 5px;
  text-decoration-thickness: 1px;
}

nav .sep {
  display: none; /* pipes hidden in vertical layout, restored on mobile */
  color: var(--text-dim);
  user-select: none;
}

nav .name {
  font-weight: 500;
  margin-bottom: 0.9rem;
  color: #F38325;
}

/* Main */
main {
  max-width: 1000px;
  margin-left: var(--sidebar-w);
  padding: 3.5rem 3rem 6rem;
}

.page { animation: fadeIn 0.45s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Section eyebrow */
.eyebrow {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 0.9rem;
}

/* Work title */
.work-title {
  font-family: 'Libre Franklin', sans-serif;
  font-style: italic;
  font-size: 2.6rem;
  font-weight: 400;
  letter-spacing: -0.015em;
  line-height: 1.1;
  margin-bottom: 0.4rem;
}

.work-meta {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 1rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 3rem;
}

/* Figure (image + caption) */
.figure { margin: 0 0 3.5rem; }

.figure .placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--placeholder);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  background-image:
    repeating-linear-gradient(45deg, transparent 0, transparent 16px, rgba(236, 230, 215, 0.018) 16px, rgba(236, 230, 215, 0.018) 17px),
    repeating-linear-gradient(-45deg, transparent 0, transparent 16px, rgba(236, 230, 215, 0.012) 16px, rgba(236, 230, 215, 0.012) 17px);
  border: 1px solid var(--border);
}

.figure .placeholder.tall { aspect-ratio: 4/5; }
.figure .placeholder.square { aspect-ratio: 1/1; }
.figure .placeholder.wide { aspect-ratio: 21/9; }

.figure .fig-img {
  width: 100%;
  height: auto;
  display: block;
  background: var(--placeholder);
  border: 1px solid var(--border);
}

.figure .fig-video {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: var(--placeholder);
  border: 1px solid var(--border);
  overflow: hidden;
}

.figure .fig-video iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

.figure .fig-itchio {
  max-width: 552px;
  background: var(--placeholder);
  border: 1px solid var(--border);
}

.figure .fig-itchio iframe {
  width: 100%;
  height: 167px;
  display: block;
  border: 0;
}

.figure .fig-pub {
  border: 1px solid var(--border);
  padding: 1.75rem 2rem;
  background: var(--bg-elev);
}

.figure .fig-pub .pub-eyebrow {
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
}

.figure .fig-pub .pub-title {
  font-family: 'Libre Franklin', sans-serif;
  font-style: italic;
  font-size: 1.3rem;
  color: var(--text);
  margin-bottom: 0.35rem;
  line-height: 1.2;
}

.figure .fig-pub .pub-meta {
  font-size: 0.82rem;
  color: var(--text-dim);
  margin-bottom: 1.25rem;
  line-height: 1.6;
}

.figure .fig-pub .pub-links {
  display: flex;
  gap: 1.25rem;
  flex-wrap: wrap;
}

.figure .fig-pub .pub-links a {
  font-size: 0.82rem;
  font-family: 'Libre Franklin', sans-serif;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid var(--text);
  padding-bottom: 2px;
  transition: opacity 0.2s;
}

.figure .fig-pub .pub-links a:hover { opacity: 0.65; }

.figure .fig-download a {
  display: inline-block;
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid var(--text);
  padding-bottom: 2px;
  transition: opacity 0.2s;
}

.figure .fig-download a:hover { opacity: 0.65; }

.figure figcaption {
  font-size: 0.84rem;
  color: var(--text-dim);
  line-height: 1.65;
  margin-top: 0.85rem;
  max-width: 75ch;
}

.figure figcaption .video-link {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}
.figure figcaption .video-link:hover { border-bottom-color: var(--accent); }

/* Work grid */
.work-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.75rem 1rem;
}

.work-card {
  text-decoration: none;
  color: inherit;
  display: block;
  cursor: pointer;
}

.work-card .thumb {
  aspect-ratio: 4/3;
  background: var(--placeholder);
  margin-bottom: 0.75rem;
  transition: transform 0.4s ease, opacity 0.3s ease;
  background-image:
    repeating-linear-gradient(45deg, transparent 0, transparent 14px, rgba(236, 230, 215, 0.02) 14px, rgba(236, 230, 215, 0.02) 15px);
  border: 1px solid var(--border);
}

.work-card img.thumb {
  width: 100%;
  height: auto;
  object-fit: cover;
  display: block;
  background-image: none;
}

.work-card:hover .thumb {
  transform: translateY(-3px);
  opacity: 0.82;
}

.work-card .label {
  font-family: 'Libre Franklin', sans-serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--text);
  letter-spacing: -0.005em;
}

.work-card .year {
  display: block;
  margin-top: 2px;
  font-family: 'Libre Franklin', sans-serif;
  font-style: normal;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* About */
.about {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 3.5rem;
  align-items: start;
}

.about-bio {
  font-size: 1rem;
  line-height: 1.75;
  max-width: 52ch;
}

.about-bio p { margin-bottom: 1.1rem; }

.about-bio p:last-child { margin-bottom: 0; }

.about-photo {
  aspect-ratio: 4/5;
  background: var(--placeholder);
  background-image:
    repeating-linear-gradient(45deg, transparent 0, transparent 14px, rgba(236, 230, 215, 0.02) 14px, rgba(236, 230, 215, 0.02) 15px);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
}

.about-photo-img {
  width: 100%;
  height: auto;
  display: block;
  background: var(--placeholder);
  border: 1px solid var(--border);
}

/* Contact */
.contact-list {
  display: flex;
  flex-direction: column;
  gap: 2rem;
  max-width: 460px;
}

.contact-item { font-family: 'Libre Franklin', sans-serif; }

.contact-item .ci-label {
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}

.contact-item a {
  font-size: 1.05rem;
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
  transition: color 0.2s, border-color 0.2s;
}

.contact-item a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.contact-item .ci-meta {
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-top: 0.35rem;
  font-family: 'Libre Franklin', sans-serif;
}

/* Press section (on About page) */
.press {
  margin-top: 5rem;
  padding-top: 3rem;
  border-top: 1px solid var(--border);
}

.press-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 1.6rem;
  max-width: 75ch;
}

.press-item {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.press-item a {
  font-family: 'Libre Franklin', sans-serif;
  font-style: italic;
  font-size: 1.1rem;
  line-height: 1.35;
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s ease;
}

.press-item a:hover { color: var(--accent); }

.press-item .source {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* Contact block at bottom of About page */
.about-contact {
  margin-top: 5rem;
  padding-top: 3rem;
  border-top: 1px solid var(--border);
}

.about-contact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 2rem;
  max-width: 75ch;
}

/* Upcoming / journal page */
.upcoming-list {
  display: flex;
  flex-direction: column;
  gap: 4rem;
  max-width: 70ch;
}

.entry { border-bottom: 1px solid var(--border); padding-bottom: 3rem; }
.entry:last-child { border-bottom: none; padding-bottom: 0; }

.entry .date {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
}

.entry h2 {
  font-family: 'Libre Franklin', sans-serif;
  font-style: italic;
  font-size: 1.65rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin-bottom: 1rem;
}

.entry-body {
  font-size: 0.98rem;
  line-height: 1.75;
  color: var(--text-dim);
}

.entry-body p { margin-bottom: 1rem; }
.entry-body p:last-child { margin-bottom: 0; }

/* Footer */
footer {
  max-width: 1000px;
  margin: 5rem 0 0 var(--sidebar-w);
  padding: 2rem 3rem;
  border-top: 1px solid var(--border);
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}

/* Responsive */
@media (max-width: 900px) {
  /* Sidebar collapses to top bar */
  header {
    position: sticky;
    width: 100%;
    bottom: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 1.4rem 2rem;
    overflow-y: visible;
  }
  nav {
    flex-direction: row;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
    font-size: 0.88rem;
  }
  nav .sep { display: inline; margin: 0 0.25rem; }
  nav .name { margin-bottom: 0; margin-right: 0.4rem; }

  main { margin-left: 0; padding: 3rem 2rem 5rem; }
  footer { margin-left: 0; padding: 2rem; }

  .work-grid { grid-template-columns: repeat(2, 1fr); gap: 1.75rem 0.85rem; }
  .about { grid-template-columns: 1fr; gap: 2.5rem; }
  .about-photo { max-width: 380px; }
  .work-title { font-size: 2rem; }
}

@media (max-width: 600px) {
  header { padding: 1.1rem 1.25rem; }
  nav { font-size: 0.82rem; gap: 0.3rem; }
  main { padding: 2.5rem 1.25rem 4rem; }
  .work-title { font-size: 1.7rem; }
  .work-grid { grid-template-columns: 1fr; gap: 2rem; }
  footer { padding: 1.5rem 1.25rem; flex-direction: column; align-items: flex-start; }
}
</style>
</head>

const FEATURED = 'sad-game';

/* ============================================================
   RENDERERS
   ============================================================ */
function renderFigures(figures) {
  return figures.map((f, i) => {
    let media;
    if (f.video) {
      const title = (f.title || '').replace(/"/g, '&quot;');
      media = `<div class="fig-video"><iframe src="https://player.vimeo.com/video/${f.video}?badge=0&autopause=0&player_id=0&app_id=58479" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="${title}" loading="lazy"></iframe></div>`;
    } else if (f.itchio) {
      media = `<div class="fig-itchio"><iframe src="https://itch.io/embed/${f.itchio}?bg_color=0f0e0c&fg_color=F0DCCA&link_color=F38325&border_color=0f0e0c&border_width=0" height="167" loading="lazy"><a href="${f.itchioUrl || '#'}">${f.itchioTitle || ''}</a></iframe></div>`;
    } else if (f.pub) {
      media = `<div class="fig-pub">
        <div class="pub-eyebrow">Publication</div>
        <div class="pub-title">${f.pub.title}</div>
        <div class="pub-meta">${f.pub.meta}</div>
        <div class="pub-links">
          ${f.pub.readUrl ? `<a href="${f.pub.readUrl}" target="_blank" rel="noopener">Read on Immerse</a>` : ''}
          ${f.pub.pdfUrl ? `<a href="${f.pub.pdfUrl}" target="_blank" rel="noopener">Download PDF</a>` : ''}
        </div>
      </div>`;
    } else if (f.download) {
      media = `<div class="fig-download"><a href="${f.download.href}" download target="_blank" rel="noopener">${f.download.label}</a></div>`;
    } else if (f.src) {
      media = `<img class="fig-img" src="${f.src}" alt="${(f.alt || '').replace(/"/g, '&quot;')}" loading="lazy">`;
    } else {
      media = `<div class="placeholder ${f.shape || ''}">[ image ${i + 1} ]</div>`;
    }
    return `
      <figure class="figure">
        ${media}
        <figcaption>${f.caption || ''}</figcaption>
      </figure>
    `;
  }).join('');
}

function renderHome() {
  const w = works[FEATURED];
  return `
    <div class="page">
      <div class="eyebrow">Most recent work</div>
      <h1 class="work-title">${w.title}</h1>
      <div class="work-meta">${w.year}</div>
      ${renderFigures(w.figures)}
    </div>
  `;
}

function renderWorkIndex() {
  const items = Object.entries(works).map(([slug, w]) => {
    const thumb = w.thumb
      ? `<img class="thumb" src="${w.thumb}" alt="${w.title}" loading="lazy">`
      : `<div class="thumb"></div>`;
    return `
      <a href="#work/${slug}" class="work-card">
        ${thumb}
        <div class="label">${w.title}<span class="year">${w.year}</span></div>
      </a>
    `;
  }).join('');
  return `
    <div class="page">
      <div class="eyebrow">Selected works</div>
      <div class="work-grid">${items}</div>
    </div>
  `;
}

function renderWorkDetail(slug) {
  const w = works[slug];
  if (!w) return renderWorkIndex();
  return `
    <div class="page">
      <h1 class="work-title">${w.title}</h1>
      <div class="work-meta">${w.year}</div>
      ${renderFigures(w.figures)}
    </div>
  `;
}

/* ============================================================
   ROUTER
   ============================================================ */
function route() {
  const hash = location.hash.replace(/^#/, '') || 'home';
  const [section, slug] = hash.split('/');
  let html, active = section;

  if (section === 'home' || hash === '') {
    html = renderHome();  active = 'home';
  } else if (section === 'work' && slug) {
    html = renderWorkDetail(slug);  active = 'work';
  } else if (section === 'work') {
    html = renderWorkIndex();  active = 'work';
  } else if (section === 'about') {
    html = renderAbout();
  } else if (section === 'upcoming') {
    html = renderUpcoming();
  } else {
    html = renderHome();  active = 'home';
  }

  document.getElementById('content').innerHTML = html;

  document.querySelectorAll('nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.route === active);
  });

  window.scrollTo({ top: 0, behavior: 'instant' });
}

window.addEventListener('hashchange', route);
window.addEventListener('load', route);
</script>
